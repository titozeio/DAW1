name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and coverage gate
        working-directory: daw1
        run: mvn -B verify

      - name: Build executable JAR
        working-directory: daw1
        run: mvn -B -DskipTests clean package

      - name: Build native Windows installer (no Java required)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "daw1/target/dist" | Out-Null
          jpackage `
            --type exe `
            --name "DAW1" `
            --input "daw1/target" `
            --main-jar "daw1-1.0-SNAPSHOT-all.jar" `
            --main-class "com.titozeio.engine.Main" `
            --dest "daw1/target/dist" `
            --vendor "titozeio" `
            --app-version "1.0.${{ github.run_number }}" `
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daw1-windows-binary-${{ github.sha }}
          path: |
            daw1/target/daw1-1.0-SNAPSHOT-all.jar
            daw1/target/daw1-1.0-SNAPSHOT.jar
            daw1/target/dist/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Build generated automatically from main.
            Commit: ${{ github.sha }}
          artifacts: "daw1/target/daw1-1.0-SNAPSHOT-all.jar,daw1/target/daw1-1.0-SNAPSHOT.jar,daw1/target/dist/*.exe"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
