name: Java CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and coverage gate
        working-directory: daw1
        run: mvn -B verify

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daw1-test-report-${{ github.sha }}
          path: |
            daw1/target/surefire-reports/**
            daw1/target/site/jacoco/**
          if-no-files-found: warn

      - name: Build executable JAR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: daw1
        run: mvn -B -DskipTests clean package

      - name: Build native Windows app-image (no Java required) (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $jpackageExe = Join-Path $env:JAVA_HOME "bin\\jpackage.exe"
          if (!(Test-Path $jpackageExe)) {
            throw "No se encontró jpackage en $jpackageExe"
          }
          if (Test-Path "daw1/target/dist") { Remove-Item "daw1/target/dist" -Recurse -Force }
          if (Test-Path "daw1/target/jpackage-input") { Remove-Item "daw1/target/jpackage-input" -Recurse -Force }
          New-Item -ItemType Directory -Force "daw1/target/dist" | Out-Null
          New-Item -ItemType Directory -Force "daw1/target/jpackage-input" | Out-Null
          Copy-Item "daw1/target/daw1-1.0-SNAPSHOT-all.jar" "daw1/target/jpackage-input/"
          & $jpackageExe `
            --type app-image `
            --name "DAW1" `
            --input "daw1/target/jpackage-input" `
            --main-jar "daw1-1.0-SNAPSHOT-all.jar" `
            --main-class "com.titozeio.engine.Launcher" `
            --dest "daw1/target/dist" `
            --vendor "titozeio" `
            --app-version "1.0.${{ github.run_number }}" `
            --java-options "--enable-native-access=ALL-UNNAMED"
          if (Test-Path "daw1/target/dist/DAW1-app-image-windows.zip") {
            Remove-Item "daw1/target/dist/DAW1-app-image-windows.zip" -Force
          }
          Compress-Archive -Path "daw1/target/dist/DAW1/*" -DestinationPath "daw1/target/dist/DAW1-app-image-windows.zip" -Force

      - name: Upload binary artifact (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: daw1-windows-latest-binary
          path: daw1/target/dist/DAW1-app-image-windows.zip
          if-no-files-found: error

      - name: Publish GitHub Release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-main
          name: Latest Main Build
          body: |
            Build generated automatically from main.
            Commit: ${{ github.sha }}
          artifacts: "daw1/target/dist/DAW1-app-image-windows.zip"
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
