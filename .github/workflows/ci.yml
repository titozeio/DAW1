name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and coverage gate
        working-directory: daw1
        run: mvn -B verify

      - name: Build executable JAR
        working-directory: daw1
        run: mvn -B -DskipTests clean package

      - name: Create launch-game-jar.bat
        shell: pwsh
        run: |
          @'
          @echo off
          setlocal
          cd /d %~dp0

          if not exist "daw1-1.0-SNAPSHOT-all.jar" (
            echo No se encontro daw1-1.0-SNAPSHOT-all.jar en esta carpeta.
            echo Coloca este .bat junto al .jar y vuelve a ejecutar.
            pause
            exit /b 1
          )

          java --enable-native-access=ALL-UNNAMED -jar "daw1-1.0-SNAPSHOT-all.jar"
          '@ | Set-Content "daw1/target/launch-game-jar.bat"

      - name: Build native Windows app-image (no Java required)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "daw1/target/dist" | Out-Null
          jpackage `
            --type app-image `
            --name "DAW1" `
            --input "daw1/target" `
            --main-jar "daw1-1.0-SNAPSHOT-all.jar" `
            --main-class "com.titozeio.engine.Launcher" `
            --dest "daw1/target/dist" `
            --vendor "titozeio" `
            --app-version "1.0.${{ github.run_number }}" `
            --java-options "--enable-native-access=ALL-UNNAMED"
          Compress-Archive -Path "daw1/target/dist/DAW1/*" -DestinationPath "daw1/target/dist/DAW1-app-image-windows.zip" -Force

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daw1-windows-binary-${{ github.sha }}
          path: |
            daw1/target/daw1-1.0-SNAPSHOT-all.jar
            daw1/target/launch-game-jar.bat
            daw1/target/dist/DAW1-app-image-windows.zip
          if-no-files-found: error

      - name: Publish GitHub Release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Build generated automatically from main.
            Commit: ${{ github.sha }}
          artifacts: "daw1/target/daw1-1.0-SNAPSHOT-all.jar,daw1/target/launch-game-jar.bat,daw1/target/dist/DAW1-app-image-windows.zip"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
