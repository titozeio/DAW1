name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and coverage gate
        working-directory: daw1
        run: mvn -B verify

      - name: Build executable JAR
        working-directory: daw1
        run: mvn -B -DskipTests clean package

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daw1-binary-${{ github.sha }}
          path: |
            daw1/target/daw1-1.0-SNAPSHOT-all.jar
            daw1/target/daw1-1.0-SNAPSHOT.jar
          if-no-files-found: error

      - name: Publish GitHub Release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Build generated automatically from main.
            Commit: ${{ github.sha }}
          artifacts: "daw1/target/daw1-1.0-SNAPSHOT-all.jar,daw1/target/daw1-1.0-SNAPSHOT.jar"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
